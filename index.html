<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Bank Application</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- Bank Logo -->

        <img src="logo.png" alt="Bank Logo" class="logo">

        <!-- Heading -->

        <h1 id="mainHeading">Smart Bank Application</h1>

        <!-- Form -->

        <form id="bankForm">

            <!-- Language -->

            <label for="language" id="languageLabel">
                Preferred Language
            </label>

            <select id="language" onchange="changeLanguage()">

                <option value="english">English</option>

                <option value="hindi">Hindi</option>

                <option value="kannada">Kannada</option>

            </select>

            <!-- Customer Name -->

            <label for="name" id="nameLabel">
                Customer Name
            </label>

            <input
                type="text"
                id="name"
                placeholder="Enter Customer Name"
                required
            >

            <!-- Account Number -->

            <label for="accountNumber" id="accountLabel">
                Account Number
            </label>

            <input
                type="text"
                id="accountNumber"
                maxlength="14"
                placeholder="Enter 14-digit Account Number"
                oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                required
            >

            <!-- Transaction -->

            <label for="transaction" id="transactionLabel">
                Transaction Type
            </label>

            <select id="transaction" required>

                <option value="">Select Transaction</option>

                <option value="Deposit">Deposit</option>

                <option value="Withdraw">Withdraw</option>

            </select>

            <!-- Amount -->

            <label for="amount" id="amountLabel">
                Amount
            </label>

            <input
                type="number"
                id="amount"
                placeholder="Enter Amount"
                required
            >

            <!-- Signature -->

            <div class="signature-section">

                <p id="signatureText">
                    <strong>Customer Signature</strong>
                </p>

                <div class="signature-box"></div>

            </div>

            <!-- Buttons -->

            <button type="button" onclick="showPreview()" id="previewBtn">
                Preview
            </button>

            <button type="submit" id="submitBtn">
                Submit
            </button>

        </form>

        <!-- Preview -->

        <div id="previewBox"></div>

        <!-- Output -->

        <div id="output"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
